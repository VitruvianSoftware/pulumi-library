# Repository CI — validates the shared Pulumi library codebase.
#
# Runs linting, building, testing with coverage enforcement, and
# commit message validation on every push and PR to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: |
          go test ./pkg/... -coverprofile=coverage.out -covermode=atomic -race -count=1
          go test ./internal/... -race -count=1

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Enforce coverage threshold (85%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if (( $(echo "$TOTAL < 85" | bc -l) )); then
            echo "::error::Coverage ${TOTAL}% is below the 85% threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-go
          path: go/coverage.out

  test-ts:
    name: Test TS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-ts
          path: ts/coverage/

  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: |
          npm install -D @commitlint/cli @commitlint/config-conventional
          echo "module.exports = { extends: ['@commitlint/config-conventional'], rules: {'subject-case': [0], 'header-max-length': [0]} };" > commitlint.config.js

      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: 'echo "$TITLE" | npx commitlint --verbose'
